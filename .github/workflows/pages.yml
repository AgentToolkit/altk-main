- name: Install dependencies
  run: pip install -r requirements-docs.txt

- name: Deploy docs
  run: mkdocs gh-deploy --force
```

If the workflow does `pip install mkdocs` without `-r requirements-docs.txt`, Material never gets installed and it falls back to the default theme.

### Fix 2: Pin the Material version explicitly in requirements-docs.txt

Change your `requirements-docs.txt` to:
```
mkdocs>=1.5.0
mkdocs-material>=9.5.0
mkdocs-material-extensions>=1.3
pymdown-extensions>=10.7.0