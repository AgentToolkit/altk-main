# Project information
site_name: Agent Lifecycle Toolkit (ALTK)
site_url: https://agenttoolkit.github.io/altk-main
site_description: >-
  Delivering plug-and-play, framework-agnostic technology agent evolution capabilities for improved performance

# Repository
repo_name: AgentToolkit/altk-main
repo_url: https://github.com/AgentToolkit/altk-main

# Copyright
copyright: >
  Copyright &copy; 2025 Agent Lifecycle Toolkit (ALTK) project –
  <a href="#__consent">Change cookie settings</a>

# Configuration
theme:
  name: material
  features:
    - announce.dismiss
    - content.tabs.link
    - content.code.annotate
    - content.code.copy
    - content.tooltips
    - navigation.footer
    - navigation.tabs
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.path
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.suggest
    - toc.follow
    - toc.integrate
  language: en
  palette:
    # Default dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to light mode

    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode

    # System preference (dark)
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-auto
        name: Switch to system preference
  font:
    text: Roboto
    code: Roboto Mono
  favicon: docs/assets/logo-32x32.png
  logo: docs/assets/logo-512x512.png
  icon:
    repo: fontawesome/brands/github

nav:
  - Agent Lifecycle Toolkit: index.md
  - Kaizen: kaizen.md

extra_css:
  - stylesheets/extra.css

extra:
  announcement:
    text: >
      🎉 Welcome to the Agent Lifecycle Toolkit documentation!
      <a href="https://github.com/AgentToolkit/altk-main" target="_blank">Star us on GitHub</a>
      and <a href="https://www.youtube.com/@AgentToolkit" target="_blank">subscribe to our YouTube channel</a>
    dismiss: true
  social:
    - icon: fontawesome/brands/github-alt
      link: https://github.com/AgentToolkit/altk-main/
    - icon: fontawesome/brands/youtube
      link: https://www.youtube.com/@AgentToolkit
  consent:
    title: Cookie consent
    description: >-
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.

markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.mark
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

# Made with Bob
