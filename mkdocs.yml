# Project information
site_name: Agent Lifecycle Toolkit (ALTK)
site_url: https://agenttoolkit.github.io/altk-main
site_description: >-
  Delivering plug-and-play, framework-agnostic technology agent evolution capabilities for improved performance

# Repository
repo_name: AgentToolkit/altk-main
repo_url: https://github.com/AgentToolkit/altk-main

# Copyright
copyright: >
  Copyright &copy; 2025 Agent Lifecycle Toolkit (ALTK) project –
  <a href="#__consent">Change cookie settings</a>

# Configuration
theme:
  name: material
  custom_dir: docs/overrides
  features:
    - announce.dismiss
    - content.tabs.link
    - content.code.annotate
    - content.code.copy
    - content.tooltips
    - navigation.footer
    - navigation.tabs         # keep — adds top nav bar
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.path
    - navigation.sections     # keep — groups sidebar entries
    - navigation.top
    - navigation.tracking
    - search.suggest
    - toc.follow
    # ❌ REMOVE toc.integrate — it hides the right-side TOC panel
  language: en
  palette:
    # ✅ Two-entry toggle only (remove the entry without a media key)
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  # ✅ Fix paths — relative to docs/, not project root
  favicon: assets/logo-32x32.png
  logo: assets/logo-512x512.png
  icon:
    repo: fontawesome/brands/github