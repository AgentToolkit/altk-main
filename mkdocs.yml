# Project information
site_name: Agent Lifecycle Toolkit (ALTK)
site_url: https://agenttoolkit.github.io/altk-main
site_description: >-
  Delivering plug-and-play, framework-agnostic technology agent evolution capabilities for improved performance

# Repository
repo_name: AgentToolkit/altk-main
repo_url: https://github.com/AgentToolkit/altk-main
edit_uri: tree/main/docs/
# Copyright
copyright: >
  Copyright &copy; 2025 Agent Lifecycle Toolkit (ALTK) project –
  <a href="#__consent">Change cookie settings</a>

# Configuration
theme:
  name: material
  custom_dir: docs/overrides
  features:
    - content.tabs.link
    - content.code.annotate
    - content.code.copy
    - content.tooltips
    - search.suggest
    - toc.follow
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
  favicon: assets/logo-32x32.png
  logo: assets/logo-512x512.png
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md

extra_css:
  - stylesheets/extra.css

extra:
  # Project switcher nav bar — shown across all ALTK sites.
  # Set active: true on whichever project this repo represents.
  # Other repos should copy this list with their own entry marked active.
  projects:
    - name: ALTK
      url: https://agenttoolkit.github.io/altk-main/
      active: true
    - name: Evolve
      url: https://agenttoolkit.github.io/altk-evolve/
    # Add more projects here:
    # - name: Another Project
    #   url: https://agenttoolkit.github.io/another-project/
    #   icon: "🔧"   # optional emoji or text icon

  social:
    - icon: fontawesome/brands/github-alt
      link: https://github.com/AgentToolkit/altk-main
    - icon: fontawesome/brands/youtube
      link: https://www.youtube.com/@AgentToolkit
  consent:
    title: Cookie consent
    description: >-
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.blocks.caption
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.mark
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

plugins:
  - search
